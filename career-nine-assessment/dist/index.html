    <script>
      // Unregister any stale service worker from previous builds
      if('serviceWorker' in navigator){navigator.serviceWorker.getRegistrations().then(function(r){r.forEach(function(reg){reg.unregister()})})}
    </script>
    <script>
      // Start pseudo-progress IMMEDIATELY — before any JS bundle loads.
      // On slow 3G the bundle takes 15+ seconds; this keeps the bar moving.
      // React's ResourcePreloader will take over via window.__plReady().
      (function(){
        var bar=document.getElementById('pl-bar');
        var label=document.getElementById('pl-label');
        var pct=2;
        if(bar)bar.style.width='2%';
        if(label)label.textContent='Loading application…';
        var t=setInterval(function(){
          // Ease toward 30% cap (just waiting for JS bundle)
          var rem=30-pct;
          if(rem>0.1)pct+=rem*0.06;
          if(bar)bar.style.width=pct.toFixed(1)+'%';
        },150);
        // React calls this to stop the boot timer and take full control
        window.__plBootPct=function(){return pct};
        window.__plBootStop=function(){clearInterval(t)};
      })();
    </script>
