# Profile: report-worker
# Activated on the dedicated worker container (SPRING_PROFILES_ACTIVE=production,report-worker).
# Runs the report.generate / report.email Kafka consumers (gated by @Profile("report-worker"))
# in their own JVM so report rendering never steals threads/heap from the live API.
# NOTE: the worker runs as a normal servlet web app (Tomcat binds 8080 INTERNALLY —
# the container does NOT publish the port, so it's unreachable from outside and just
# idles). We do NOT use web-application-type=none because the shared Spring Security
# OAuth2-client config needs the servlet web context (ClientRegistrationRepository);
# a non-web context fails to start. Trimming this to a true headless worker requires
# gating the web-security/OAuth2 config off for this profile — a later refactor.
spring:
  # The api container owns DB migrations; the worker must NOT run Flyway
  # (avoids a redundant second migrator + the prod history-validation mismatch).
  flyway:
    enabled: false

  # Slow-consumer poll contract. Report generation takes ~10-60s per event
  # (Gotenberg-bound), while Kafka's DEFAULTS hand a consumer up to 500 records
  # with a 5-minute processing budget (max.poll.interval.ms). On any large
  # admin batch that budget blows: the broker evicts the consumer mid-batch
  # ("poll timeout expired" → LeaveGroup), every commit then fails
  # (CommitFailedException), the group rebalances in a loop, students get
  # generated twice, and records land in the DLT with cause=null even though
  # their reports were fine. One record per poll + a 10-minute budget makes a
  # poll cycle = one report, far inside the interval; generate-concurrency
  # (not batch size) provides the parallelism.
  kafka:
    consumer:
      max-poll-records: 1
      properties:
        max.poll.interval.ms: 600000

# Pipeline tuning (override per environment / during load testing via env vars, e.g.
# REPORT_PIPELINE_GENERATE_CONCURRENCY=2). Defaults are tuned for one 8-vCPU box.
report:
  pipeline:
    enabled: true
    generate-concurrency: 3   # bounded to Gotenberg's CPU budget
    email-concurrency: 2
    partitions: 6             # ≥ max concurrency
    max-attempts: 5
    backoff-ms: 5000
    pdf-attempts: 3           # PDF re-render attempts before link-only fallback
    email-rate-per-sec: 0     # 0 = no pacing; set >0 to throttle Odoo sends
    idem-lock-seconds: 300
    idem-sent-days: 7
