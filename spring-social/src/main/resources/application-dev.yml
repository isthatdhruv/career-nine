spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:mysql://localhost:3306/career-9?useSSL=false&serverTimezone=UTC&useLegacyDatetimeCode=false&allowPublicKeyRetrieval=true
    username: root
    password: Career-qCsfeuECc3MW
    hikari:
      # Dev sizing: a single dev machine with one running JVM rarely needs >10
      # concurrent JDBC connections, and a high minimum-idle quickly exhausts
      # MySQL's default max_connections=151 when stale JVMs are left around or
      # when multiple clients (Workbench, DBeaver) connect alongside.
      maximum-pool-size: 10
      minimum-idle: 2
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update
  cache:
    redis:
      key-prefix: "career9:"
  redis:
    host: localhost
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 2
  mail:
    properties:
      mail:
        smtp:
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000
  security:
    oauth2:
      client:
        registration:
          google:
