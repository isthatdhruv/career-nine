    username: ${ODOO_USERNAME:}
    api-key: ${ODOO_API_KEY:}
  gmail:
    sender-email: ${GMAIL_SENDER:notifications@career-9.net}
  digitalocean:
    spaces:
      bucket: storage-c9
      region: sgp1
      cdn-url: https://storage-c9.sgp1.digitaloceanspaces.com
      access-key: ${DO_SPACES_ACCESS_KEY:}
      secret-key: ${DO_SPACES_SECRET_KEY:}
      endpoint: https://sgp1.digitaloceanspaces.com
  razorpay:
    key-id: ${RAZORPAY_KEY_ID:}
    key-secret: ${RAZORPAY_KEY_SECRET:}
    webhook-secret: ${RAZORPAY_WEBHOOK_SECRET}
    callback-base-url: https://staging-assessment.career-9.com
  b2c:
    frontendBaseUrl: https://staging-dashboard.career-9.com
    assessmentBaseUrl: https://staging-assessment.career-9.com
  # Phase 20-01: in-process rate limit (Bucket4j). Sandbox is a pre-prod soak
  # environment; per Phase 20 plan the upstream-proxy assumption is NOT yet
  # confirmed for this profile, so XFF stays fail-safe false. Flip to true
  # once the deployment is verified to be behind a trusted reverse proxy.
  rate-limit:
    enabled: true
    ip-per-minute: 10
    user-per-minute: 50
    window-seconds: 60
    trust-xff: false

# Phase 15 RBAC + ABAC enforcement mode (see root document for semantics).
# Phase 17-04 (2026-05-12): sandbox flipped to `enforce` for pre-prod soak.
auth:
  enforce-mode: enforce

---
spring:

  config:
    activate:
      on-profile: staging
  datasource:
    url: jdbc:mysql://easylearning.guru:3310/kcc_student?useSSL=false&serverTimezone=UTC&useLegacyDatetimeCode=false&&allowPublicKeyRetrieval=true
    username: root
    password: ${SPRING_DATASOURCE_PASSWORD}
    # password: Google.com1
    hikari:
      maximum-pool-size: 50
      minimum-idle: 20
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  jpa:
    show-sql: false
    hibernate:
      naming-strategy: org.hibernate.cfg.EJB3NamingStrategy
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL5InnoDBDialect
        default_batch_fetch_size: 30
        jdbc:
          batch_size: 30
        order_inserts: true
        order_updates: true
  cache:
    type: redis
    cache-names: assessmentQuestions,assessmentDetails,measuredQualityTypes,questionnaireQuestions
    redis:
      time-to-live: 86400000
      key-prefix: "career9:"
      use-key-prefix: true
  redis:
    host: redis_cache
    port: 6379
    timeout: 2000ms
    lettuce:
      pool:
        max-active: 50
        max-idle: 20
        min-idle: 5
        max-wait: 5000ms
      shutdown-timeout: 200ms
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${SMTP_USERNAME}
    password: ${SMTP_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 10000
          timeout: 10000
          writetimeout: 10000
  security:
    oauth2:
      client:
        registration:
          google:
            clientId: 701038408648-gnmlifdksik4mqu2as5vpgpe64l8m55b.apps.googleusercontent.com
            clientSecret: ${GOOGLE_CLIENT_SECRET}
            # redirectUri: "{baseUrl}/oauth2/callback/{registrationId}"
            redirectUri: "https://api.kccitm.in/oauth2/callback/{registrationId}"

            scope:
              - email
              - profile
              - https://www.googleapis.com/auth/admin.directory.user
              - https://www.googleapis.com/auth/admin.directory.group
              - https://www.googleapis.com/auth/admin.directory.orgunit
          facebook:
            clientId: 121189305185277
            clientSecret: ${FACEBOOK_CLIENT_SECRET}
            redirectUri: "{baseUrl}/oauth2/callback/{registrationId}"
            scope:
              - email
              - public_profile
          github:
            clientId: d3e47fc2ddd966fa4352
            clientSecret: ${GITHUB_CLIENT_SECRET}
            redirectUri: "{baseUrl}/oauth2/callback/{registrationId}"
            scope:
              - user:email
              - read:user
        provider:
          facebook:
            authorizationUri: https://www.facebook.com/v3.0/dialog/oauth
            tokenUri: https://graph.facebook.com/v3.0/oauth/access_token
            userInfoUri: https://graph.facebook.com/v3.0/me?fields=id,first_name,middle_name,last_name,name,email,verified,is_verified,picture.width(250).height(250)
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,caches
  endpoint:
    health:
      show-details: always
      show-components: always
  health:
    redis:
      enabled: true
app:
  protocol: http
  name: student.kccitm.in
  googleAPIJSON: classpath:google.json
  fileTempFolder: classpath:temp
  auth:
    tokenSecret: "${APP_AUTH_TOKEN_SECRET:1PG4GePk3fxNKAAgI45mGa+YzrgVidfeau5o+Y5T+IUzyr/Ab3+O2C/QaG7s+XujsJdPlBgqsBc4tEKLenVI1A==}"
    tokenExpirationMsec: 864000000
    accessTokenExpirationMsec: 3600000      # 60 min (Phase 18 short-lived access JWT)
    refreshTokenExpirationMsec: 604800000   # 7 days (Phase 18 opaque refresh token)
    assessmentTokenExpirationMsec: 14400000 # 4h — Phase 19 assessment-scoped JWT TTL (cn_at_asmnt)
  # SuperAdminBootstrapper reads these on every boot.
  #   - If superAdminEmail resolves to an existing user → ensure is_super_admin=true.
  #   - If not → create a local-provider user with the password BCrypt-hashed.
  # Leave superAdminEmail blank/null to disable bootstrap once production admins
  # are established. CHANGE THESE BEFORE PRODUCTION.
  bootstrap:
    superAdminEmail: admin@career-9.local
    superAdminPassword: ChangeMeOnFirstLogin!2026
    superAdminName: System Administrator
  cookie:
    secure: true
    same-site: Strict
    access-max-age-seconds: 864000
  cors:
    allowedOrigins: https://career-9.com,https://www.career-9.com,https://*.career-9.com,https://dashboard.career-9.com,https://assessment.career-9.com,http://localhost:3000,http://localhost:3001,http://localhost:8080,http://localhost,http://localhost:80,https://staging.student.kccitm.in,https://student.kccitm.in
  oauth2:
    # After successfully authenticating with the OAuth2 Provider,
    # we'll be generating an auth token for the user and sending the token to the
    # redirectUri mentioned by the client in the /oauth2/authorize request.
    # We're not using cookies because they won't work well in mobile clients.
    authorizedRedirectUris:
      - https://student.kccitm.in/oauth2/redirect
      - https://staging.student.kccitm.in/oauth2/redirect
      - https://student.kccitm.in/oauth2/redirect
      - http://localhost:3000/oauth2/redirect
      - myandroidapp://oauth2/redirect
      - http://localhost/oauth2/redirect
      - http://localhost:80/oauth2/redirect
      - myiosapp://oauth2/redirect
  mandrill: ${APP_MANDRILL:}
  odoo:
    url: ${ODOO_URL:}
    database: ${ODOO_DATABASE:}
    username: ${ODOO_USERNAME:}
    api-key: ${ODOO_API_KEY:}

  gmail:
    sender-email: ${GMAIL_SENDER:notifications@career-9.net}
  digitalocean:
    spaces:
      bucket: storage-c9
      region: sgp1
      cdn-url: https://storage-c9.sgp1.digitaloceanspaces.com
      access-key: ${DO_SPACES_ACCESS_KEY:}
      secret-key: ${DO_SPACES_SECRET_KEY:}
      endpoint: https://sgp1.digitaloceanspaces.com
  razorpay:
    webhook-secret: ${RAZORPAY_WEBHOOK_SECRET}
  # Phase 20-01: in-process rate limit (Bucket4j). Staging runs behind
  # DigitalOcean's reverse proxy which sets X-Forwarded-For and strips any
  # incoming XFF from untrusted clients — safe to trust here.
  rate-limit:
    enabled: true
    ip-per-minute: 10
    user-per-minute: 50
    window-seconds: 60
    trust-xff: true   # behind DigitalOcean reverse proxy

# Phase 15 RBAC + ABAC enforcement mode (see root document for semantics).
# Phase 17-04 (2026-05-12): staging flipped to `enforce` for pre-prod soak.
# After 1-2 days of clean auth_audit DENY review, operator may flip production
# (currently still `log-only` per user-directed safety hold).
auth:
  enforce-mode: enforce

---