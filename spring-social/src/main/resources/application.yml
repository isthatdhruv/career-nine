# >>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>
# REQUIRES USER ACTION BEFORE PRODUCTION ENFORCE (Phase 17-04, 2026-05-12)
# >>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>
# Production INTENTIONALLY remains `log-only` per user-directed safety hold.
# Sandbox is flipped to `enforce` to soak the new enforce semantics.
# Operator must:
#   1. Review `auth_audit` DENY rows from sandbox + production for 1-2 days.
#   2. Confirm ZERO false-positive DENYs against legitimate admin users.
#   3. Manually edit the line below: `log-only` -> `enforce`.
#   4. Redeploy production with the change.
# Until that manual step, production behaves as Phase 15 log-only:
# DENYs are recorded but allows() returns true (no 403). See 17-04-SUMMARY.md.
# <<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<
auth:
  enforce-mode: log-only
