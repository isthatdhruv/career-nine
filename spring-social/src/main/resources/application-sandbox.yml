spring:
  config:
    activate:
      on-profile: sandbox
  datasource:
    url: jdbc:mysql://mysql_db_staging:3306/career-9-staging?useSSL=false&serverTimezone=UTC&useLegacyDatetimeCode=false&allowPublicKeyRetrieval=true
    username: root
    password: ${SPRING_DATASOURCE_PASSWORD}
    hikari:
      maximum-pool-size: 30
      minimum-idle: 10
  jpa:
    show-sql: false
    hibernate:
      ddl-auto: update
  cache:
    redis:
      key-prefix: "career9-staging:"
  redis:
    host: redis_staging
    lettuce:
      pool:
        max-active: 30
        max-idle: 10
        min-idle: 2
  mail:
    properties:
      mail:
        smtp:
          connectiontimeout: 10000
          timeout: 10000
          writetimeout: 10000
  security:
    oauth2:
      client:
        registration:
          google:
            clientId: 101961828065-ak601ssij07ugrffovuns8v2adrqvtqd.apps.googleusercontent.com
            clientSecret: ${GOOGLE_CLIENT_SECRET}
            redirectUri: "https://api-staging.career-9.com/oauth2/callback/{registrationId}"
          facebook:
            clientId: 121189305185277
            clientSecret: ${FACEBOOK_CLIENT_SECRET}
            redirectUri: "{baseUrl}/oauth2/callback/{registrationId}"
          github:
            clientId: d3e47fc2ddd966fa4352
            clientSecret: ${GITHUB_CLIENT_SECRET}
            redirectUri: "{baseUrl}/oauth2/callback/{registrationId}"

server:
  tomcat:
    threads:
      max: 200
      min-spare: 30

app:
  protocol: https
  name: api-staging.career-9.com
  cookie:
    secure: true
  cors:
    allowedOrigins: https://career-9.com,https://www.career-9.com,https://dashboard.career-9.com,https://assessment.career-9.com,https://*.career-9.com,http://localhost:5173,http://localhost:3000
  oauth2:
    authorizedRedirectUris:
      - https://dashboard.career-9.com/oauth2/redirect
      - https://career-9.com/oauth2/redirect
      - https://www.career-9.com/oauth2/redirect
      - https://assessment.career-9.com/oauth2/redirect
      - https://student.kccitm.in/oauth2/redirect
      - https://staging.student.kccitm.in/oauth2/redirect
      - http://localhost:3000/oauth2/redirect
      - myandroidapp://oauth2/redirect
      - myiosapp://oauth2/redirect
  razorpay:
    key-id: ${RAZORPAY_KEY_ID:}
    key-secret: ${RAZORPAY_KEY_SECRET:}
    webhook-secret: ${RAZORPAY_WEBHOOK_SECRET}
    callback-base-url: https://staging-assessment.career-9.com
  digitalocean:
    spaces:
      access-key: ${DO_SPACES_ACCESS_KEY:}
      secret-key: ${DO_SPACES_SECRET_KEY:}
  b2c:
    frontendBaseUrl: https://staging-dashboard.career-9.com
    assessmentBaseUrl: https://staging-assessment.career-9.com
  # Phase 20-01: in-process rate limit (Bucket4j). Sandbox is a pre-prod soak
  # environment; per Phase 20 plan the upstream-proxy assumption is NOT yet
  # confirmed for this profile, so XFF stays fail-safe false. Flip to true
  # once the deployment is verified to be behind a trusted reverse proxy.
  rate-limit:
    trust-xff: false

# Phase 15 RBAC + ABAC enforcement mode (see root document for semantics).
# Phase 17-04 (2026-05-12): sandbox flipped to `enforce` for pre-prod soak.
auth:
  enforce-mode: enforce
