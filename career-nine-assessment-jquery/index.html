<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Career-9 Assessment</title>

  <!-- Bootstrap 5 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />

  <!-- Custom Styles -->
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- SPA Root -->
  <div id="app-root">
    <!-- Loading spinner shown initially -->
    <div id="global-spinner" style="
      position:fixed;inset:0;display:flex;align-items:center;
      justify-content:center;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);
      z-index:9999;
    ">
      <div class="text-center">
        <div class="spinner-border text-light" role="status" style="width:3rem;height:3rem;"></div>
        <p class="mt-3 text-white fw-semibold">Loading...</p>
      </div>
    </div>
  </div>

  <!-- Game overlay container -->
  <div id="game-overlay" style="display:none;position:fixed;inset:0;z-index:9999;background:white;overflow-y:auto;"></div>

  <!-- jQuery -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <!-- Bootstrap 5 JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Firebase (modular compat CDN) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <!-- Axios for API calls -->
  <script src="https://cdn.jsdelivr.net/npm/axios@1.7.2/dist/axios.min.js"></script>

  <!-- Core modules (order matters) -->
  <script src="js/config.js"></script>
  <script src="js/firebase-init.js"></script>
  <script src="js/state.js"></script>
  <script src="js/api.js"></script>
  <script src="js/utils.js"></script>

  <!-- Page modules -->
  <script src="js/pages/login.js"></script>
  <script src="js/pages/demographics.js"></script>
  <script src="js/pages/allotted-assessment.js"></script>
  <script src="js/pages/general-instructions.js"></script>
  <script src="js/pages/select-section.js"></script>
  <script src="js/pages/section-instruction.js"></script>
  <script src="js/pages/section-question.js"></script>
  <script src="js/pages/thank-you.js"></script>
  <script src="js/pages/register.js"></script>

  <!-- Game modules -->
  <script src="js/games/jungle-spot.js"></script>
  <script src="js/games/rabbit-path.js"></script>
  <script src="js/games/hydro-tube.js"></script>
  <script src="js/games/game-wrapper.js"></script>

  <!-- Proctoring (WebGazer + MediaPipe loaded dynamically at runtime) -->
  <script src="js/proctoring.js"></script>

  <!-- Router (last — starts the app) -->
  <script src="js/router.js"></script>

</body>
</html>
